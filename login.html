<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin - ResiKu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #0d7c66;
        --primary-light: #b8e6d9;
        --primary-dark: #095a4a;
        --secondary: #1a2e4a;
        --bg-white: #ffffff;
        --bg-alt: #f8fafc;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --border: #e2e8f0;
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        --shadow-hover: 0 8px 48px rgba(0, 0, 0, 0.1);
        --radius: 12px;
        --transition: 0.3s ease;
        --danger: #ef4444;
        --success: #10b981;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: linear-gradient(
          135deg,
          #f0f9f6 0%,
          #e8f5f1 50%,
          #ffffff 100%
        );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .login-wrapper {
        width: 100%;
        max-width: 420px;
      }

      .login-card {
        background: var(--bg-white);
        border-radius: var(--radius);
        padding: 40px 32px;
        box-shadow: var(--shadow-hover);
        border: 1px solid var(--border);
      }

      .login-header {
        text-align: center;
        margin-bottom: 32px;
      }

      .login-logo {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 28px;
        font-weight: 800;
        color: var(--primary);
        text-decoration: none;
        margin-bottom: 8px;
      }

      .login-logo .logo-icon {
        font-size: 32px;
      }

      .login-header h1 {
        font-size: 22px;
        font-weight: 700;
        color: var(--text-primary);
        margin-top: 8px;
      }

      .login-header p {
        font-size: 14px;
        color: var(--text-secondary);
        margin-top: 4px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 6px;
      }

      .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 15px;
        font-family: "Inter", sans-serif;
        transition: all var(--transition);
        background: var(--bg-white);
        color: var(--text-primary);
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(13, 124, 102, 0.1);
      }

      .form-group input.error {
        border-color: var(--danger);
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
      }

      .form-group .input-icon {
        position: relative;
      }

      .form-group .input-icon span {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
      }

      .form-group .input-icon input {
        padding-left: 44px;
      }

      .btn-login {
        width: 100%;
        padding: 14px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all var(--transition);
        font-family: "Inter", sans-serif;
      }

      .btn-login:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(13, 124, 102, 0.3);
      }

      .btn-login:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      .login-error {
        display: none;
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger);
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 14px;
        margin-bottom: 16px;
        border: 1px solid rgba(239, 68, 68, 0.2);
      }

      .login-error.show {
        display: block;
        animation: shake 0.4s ease;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-8px);
        }
        75% {
          transform: translateX(8px);
        }
      }

      .login-footer {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        color: var(--text-secondary);
      }

      .login-footer a {
        color: var(--primary);
        font-weight: 600;
        transition: all var(--transition);
      }

      .login-footer a:hover {
        color: var(--primary-dark);
      }

      @media (max-width: 480px) {
        .login-card {
          padding: 28px 20px;
        }
        .login-header h1 {
          font-size: 20px;
        }
        .login-logo {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <!-- Header -->
        <div class="login-header">
          <a href="index.html" class="login-logo">
            <span class="logo-icon">🗑️</span>
            ResiKu
          </a>
          <h1>Admin Login</h1>
          <p>Masuk untuk mengelola konten landing page</p>
        </div>

        <!-- Error Message -->
        <div class="login-error" id="loginError">
          ❌ Username atau password salah. Silakan coba lagi.
        </div>

        <!-- Login Form -->
        <form id="loginForm" autocomplete="off">
          <div class="form-group">
            <label for="username">Username</label>
            <div class="input-icon">
              <span>👤</span>
              <input
                type="text"
                id="username"
                placeholder="Masukkan username"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-icon">
              <span>🔒</span>
              <input
                type="password"
                id="password"
                placeholder="Masukkan password"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn-login" id="loginBtn">Login</button>
        </form>

        <!-- Footer -->
        <div class="login-footer">
          <a href="index.html">← Kembali ke Landing Page</a>
        </div>
      </div>
    </div>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

      const SUPABASE_URL = "https://wolrdosummupkzihfhdt.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvbHJkb3N1bW11cGt6aWhmaGR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMDc2MTcsImV4cCI6MjA5OTY4MzYxN30.lt0S-eZKTBDvdHkw_pEVWymw5SHAknSHze7zxrQYT9Y";
      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const loginForm = document.getElementById("loginForm");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const loginBtn = document.getElementById("loginBtn");
      const loginError = document.getElementById("loginError");

      if (localStorage.getItem("resiku_admin_logged_in") === "true") {
        window.location.href = "admin.html";
      }

      loginForm.addEventListener("submit", async function (e) {
        e.preventDefault();

        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        loginError.classList.remove("show");
        usernameInput.classList.remove("error");
        passwordInput.classList.remove("error");

        if (!username || !password) {
          loginError.textContent = "❌ Username dan password harus diisi!";
          loginError.classList.add("show");
          if (!username) usernameInput.classList.add("error");
          if (!password) passwordInput.classList.add("error");
          return;
        }

        loginBtn.textContent = "🔄 Memeriksa...";
        loginBtn.disabled = true;

        const { data, error } = await supabase.rpc("verify_admin_login", {
          p_username: username,
          p_password: password,
        });

        if (error) {
          console.error("Login error:", error);
          loginError.textContent = "❌ Terjadi kesalahan. Coba lagi.";
          loginError.classList.add("show");
          loginBtn.textContent = "🔑 Login";
          loginBtn.disabled = false;
          return;
        }

        if (data === true) {
          localStorage.setItem("resiku_admin_logged_in", "true");
          localStorage.setItem("resiku_admin_username", username);

          loginBtn.textContent = "Login Berhasil...";

          setTimeout(() => {
            window.location.href = "admin.html";
          }, 500);
        } else {
          loginError.textContent =
            "❌ Username atau password salah. Silakan coba lagi.";
          loginError.classList.add("show");
          usernameInput.classList.add("error");
          passwordInput.classList.add("error");

          loginError.style.animation = "none";
          setTimeout(() => {
            loginError.style.animation = "shake 0.4s ease";
          }, 10);

          loginBtn.textContent = "Login";
          loginBtn.disabled = false;
        }
      });

      usernameInput.addEventListener("input", function () {
        this.classList.remove("error");
        loginError.classList.remove("show");
      });

      passwordInput.addEventListener("input", function () {
        this.classList.remove("error");
        loginError.classList.remove("show");
      });

      passwordInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          loginForm.dispatchEvent(new Event("submit"));
        }
      });

      console.log("ResiKu Admin Login ready (Supabase)");
    </script>
  </body>
</html>
